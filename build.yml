name: Build unsigned IPA

on:
  workflow_dispatch:
  push:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract source ZIP
        shell: bash
        run: |
          set -euo pipefail

          ZIP_FILE="$(find . -maxdepth 1 -type f -iname '*.zip' | head -n 1)"

          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found in repository root"
            exit 1
          fi

          rm -rf extracted-source
          mkdir extracted-source
          ditto -x -k "$ZIP_FILE" extracted-source

          PROJECT_FILE="$(find extracted-source -type f -name project.yml | head -n 1)"

          if [ -z "$PROJECT_FILE" ]; then
            echo "project.yml not found in ZIP"
            exit 1
          fi

          PROJECT_DIR="$(dirname "$PROJECT_FILE")"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          xcodegen generate

      - name: Resolve Swift packages
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"

          xcodebuild \
            -project OGGConverter.xcodeproj \
            -scheme OGGConverter \
            -resolvePackageDependencies

      - name: Build unsigned iPhone app
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"

          xcodebuild \
            -project OGGConverter.xcodeproj \
            -scheme OGGConverter \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$GITHUB_WORKSPACE/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=YES \
            build

      - name: Embed required Swift runtime libraries
        shell: bash
        run: |
          set -euo pipefail

          APP_PATH="$GITHUB_WORKSPACE/build/Build/Products/Release-iphoneos/OGGConverter.app"
          FRAMEWORKS_DIR="$APP_PATH/Frameworks"

          test -d "$APP_PATH"
          mkdir -p "$FRAMEWORKS_DIR"

          xcrun swift-stdlib-tool \
            --copy \
            --verbose \
            --scan-executable "$APP_PATH/OGGConverter" \
            --scan-folder "$FRAMEWORKS_DIR" \
            --platform iphoneos \
            --destination "$FRAMEWORKS_DIR"

          if [ ! -f "$FRAMEWORKS_DIR/libswiftCoreMedia.dylib" ]; then
            SWIFT_COREMEDIA="$(find "$(xcode-select -p)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift" \
              -path '*/iphoneos/libswiftCoreMedia.dylib' -print -quit)"

            if [ -z "$SWIFT_COREMEDIA" ]; then
              echo "libswiftCoreMedia.dylib not found in Xcode toolchain"
              exit 1
            fi

            cp "$SWIFT_COREMEDIA" "$FRAMEWORKS_DIR/"
          fi

          echo "Embedded Swift libraries:"
          find "$FRAMEWORKS_DIR" -maxdepth 1 -type f -name 'libswift*.dylib' -print
          test -f "$FRAMEWORKS_DIR/libswiftCoreMedia.dylib"

      - name: Package unsigned IPA
        shell: bash
        run: |
          set -euo pipefail

          APP_PATH="$GITHUB_WORKSPACE/build/Build/Products/Release-iphoneos/OGGConverter.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "OGGConverter.app not found"
            find "$GITHUB_WORKSPACE/build" -maxdepth 6 -type d -name '*.app' || true
            exit 1
          fi

          rm -rf "$GITHUB_WORKSPACE/Payload"
          mkdir "$GITHUB_WORKSPACE/Payload"
          cp -R "$APP_PATH" "$GITHUB_WORKSPACE/Payload/"

          cd "$GITHUB_WORKSPACE"
          rm -f OGGConverter-unsigned.ipa
          zip -qry OGGConverter-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OGGConverter-unsigned-ipa
          path: OGGConverter-unsigned.ipa
          if-no-files-found: error
          retention-days: 30
