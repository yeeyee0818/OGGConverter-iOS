name: Build AudioBridge unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Locate or extract project
        shell: bash
        run: |
          set -euo pipefail

          if [ -f project.yml ]; then
            PROJECT_DIR="$GITHUB_WORKSPACE"
          else
            ZIP_FILE="$(find . -maxdepth 1 -type f -iname '*.zip' | head -n 1)"
            test -n "$ZIP_FILE"
            rm -rf extracted-source
            mkdir extracted-source
            ditto -x -k "$ZIP_FILE" extracted-source
            PROJECT_FILE="$(find extracted-source -type f -name project.yml | head -n 1)"
            test -n "$PROJECT_FILE"
            PROJECT_DIR="$(dirname "$PROJECT_FILE")"
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd "$PROJECT_DIR"
          xcodegen generate

      - name: Resolve packages
        run: |
          cd "$PROJECT_DIR"
          xcodebuild \
            -project AudioBridge.xcodeproj \
            -scheme AudioBridge \
            -resolvePackageDependencies

      - name: Build unsigned app
        run: |
          cd "$PROJECT_DIR"
          xcodebuild \
            -project AudioBridge.xcodeproj \
            -scheme AudioBridge \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$GITHUB_WORKSPACE/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=NO \
            build

      - name: Fix FFmpeg Swift overlay linkage
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$GITHUB_WORKSPACE/build/Build/Products/Release-iphoneos/AudioBridge.app"
          FRAMEWORKS_DIR="$APP_PATH/Frameworks"
          test -d "$FRAMEWORKS_DIR"

          for FRAMEWORK in "$FRAMEWORKS_DIR"/*.framework; do
            [ -d "$FRAMEWORK" ] || continue
            NAME="$(basename "$FRAMEWORK" .framework)"
            BINARY="$FRAMEWORK/$NAME"
            [ -f "$BINARY" ] || continue

            if otool -L "$BINARY" | grep -q '@rpath/libswiftCoreMedia.dylib'; then
              install_name_tool \
                -change '@rpath/libswiftCoreMedia.dylib' \
                        '/usr/lib/swift/libswiftCoreMedia.dylib' \
                "$BINARY"
            fi
          done

          find "$FRAMEWORKS_DIR" -maxdepth 1 -type f -name 'libswift*.dylib' -delete

          if grep -R -a -l '@rpath/libswiftCoreMedia.dylib' "$FRAMEWORKS_DIR"; then
            echo "Unfixed libswiftCoreMedia dependency remains"
            exit 1
          fi

      - name: Package IPA
        run: |
          APP_PATH="$GITHUB_WORKSPACE/build/Build/Products/Release-iphoneos/AudioBridge.app"
          test -d "$APP_PATH"
          rm -rf "$GITHUB_WORKSPACE/Payload"
          mkdir "$GITHUB_WORKSPACE/Payload"
          cp -R "$APP_PATH" "$GITHUB_WORKSPACE/Payload/"
          cd "$GITHUB_WORKSPACE"
          zip -qry AudioBridge-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AudioBridge-unsigned-ipa
          path: AudioBridge-unsigned.ipa
          if-no-files-found: error
          retention-days: 30
