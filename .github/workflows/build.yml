name: Build unsigned IPA

on:
  workflow_dispatch:
  push:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract source ZIP
        shell: bash
        run: |
          set -euo pipefail

          ZIP_FILE="$(find . -maxdepth 1 -type f -iname '*.zip' | head -n 1)"

          if [ -z "$ZIP_FILE" ]; then
            echo "没有在仓库根目录找到 ZIP 文件"
            exit 1
          fi

          echo "找到源码包：$ZIP_FILE"

          rm -rf extracted-source
          mkdir extracted-source
          ditto -x -k "$ZIP_FILE" extracted-source

          PROJECT_FILE="$(find extracted-source -type f -name project.yml | head -n 1)"

          if [ -z "$PROJECT_FILE" ]; then
            echo "ZIP 内没有找到 project.yml"
            exit 1
          fi

          PROJECT_DIR="$(dirname "$PROJECT_FILE")"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "工程目录：$PROJECT_DIR"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          xcodegen generate

      - name: Resolve Swift packages
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"

          xcodebuild \
            -project OGGConverter.xcodeproj \
            -scheme OGGConverter \
            -resolvePackageDependencies

      - name: Build unsigned iPhone app
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"

          xcodebuild \
            -project OGGConverter.xcodeproj \
            -scheme OGGConverter \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$GITHUB_WORKSPACE/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        shell: bash
        run: |
          set -euo pipefail

          APP_PATH="$GITHUB_WORKSPACE/build/Build/Products/Release-iphoneos/OGGConverter.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "没有找到编译后的 OGGConverter.app"
            find "$GITHUB_WORKSPACE/build" -maxdepth 6 -type d -name '*.app' || true
            exit 1
          fi

          rm -rf "$GITHUB_WORKSPACE/Payload"
          mkdir "$GITHUB_WORKSPACE/Payload"
          cp -R "$APP_PATH" "$GITHUB_WORKSPACE/Payload/"

          cd "$GITHUB_WORKSPACE"
          zip -qry OGGConverter-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OGGConverter-unsigned-ipa
          path: OGGConverter-unsigned.ipa
          if-no-files-found: error
          retention-days: 30
