name: Build fixed unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract source ZIP
        shell: bash
        run: |
          set -euo pipefail

          ZIP_FILE="$(find . -maxdepth 1 -type f -iname '*.zip' | head -n 1)"

          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found in repository root"
            exit 1
          fi

          rm -rf extracted-source
          mkdir extracted-source
          ditto -x -k "$ZIP_FILE" extracted-source

          PROJECT_FILE="$(find extracted-source -type f -name project.yml | head -n 1)"

          if [ -z "$PROJECT_FILE" ]; then
            echo "project.yml not found in ZIP"
            exit 1
          fi

          PROJECT_DIR="$(dirname "$PROJECT_FILE")"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Project directory: $PROJECT_DIR"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          xcodegen generate

      - name: Resolve Swift packages
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"

          xcodebuild             -project OGGConverter.xcodeproj             -scheme OGGConverter             -resolvePackageDependencies

      - name: Build unsigned iPhone app
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"

          xcodebuild             -project OGGConverter.xcodeproj             -scheme OGGConverter             -configuration Release             -sdk iphoneos             -destination "generic/platform=iOS"             -derivedDataPath "$GITHUB_WORKSPACE/build"             CODE_SIGNING_ALLOWED=NO             CODE_SIGNING_REQUIRED=NO             CODE_SIGN_IDENTITY=""             ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=NO             build

      - name: Fix FFmpeg Swift CoreMedia linkage
        shell: bash
        run: |
          set -euo pipefail

          APP_PATH="$GITHUB_WORKSPACE/build/Build/Products/Release-iphoneos/OGGConverter.app"
          FRAMEWORKS_DIR="$APP_PATH/Frameworks"

          test -d "$APP_PATH"
          test -d "$FRAMEWORKS_DIR"

          # The FFmpeg binary frameworks incorrectly request the system Swift
          # CoreMedia overlay through @rpath. Point them to the system location.
          for FRAMEWORK in "$FRAMEWORKS_DIR"/*.framework; do
            [ -d "$FRAMEWORK" ] || continue

            NAME="$(basename "$FRAMEWORK" .framework)"
            BINARY="$FRAMEWORK/$NAME"
            [ -f "$BINARY" ] || continue

            if otool -L "$BINARY" | grep -q '@rpath/libswiftCoreMedia.dylib'; then
              echo "Patching $BINARY"
              install_name_tool                 -change '@rpath/libswiftCoreMedia.dylib'                         '/usr/lib/swift/libswiftCoreMedia.dylib'                 "$BINARY"
            fi
          done

          # iOS 16+ supplies the Swift runtime. Do not bundle a second copy,
          # because mixing bundled and system Swift runtimes can abort at launch.
          find "$FRAMEWORKS_DIR"             -maxdepth 1             -type f             -name 'libswift*.dylib'             -print             -delete

          echo "Verifying linkage"
          FAILED=0

          for FRAMEWORK in "$FRAMEWORKS_DIR"/*.framework; do
            [ -d "$FRAMEWORK" ] || continue

            NAME="$(basename "$FRAMEWORK" .framework)"
            BINARY="$FRAMEWORK/$NAME"
            [ -f "$BINARY" ] || continue

            if otool -L "$BINARY" | grep -q '@rpath/libswift'; then
              echo "Unfixed Swift @rpath dependency in $BINARY"
              otool -L "$BINARY"
              FAILED=1
            fi
          done

          if find "$FRAMEWORKS_DIR" -maxdepth 1 -type f -name 'libswift*.dylib' | grep -q .; then
            echo "Bundled Swift runtime libraries are still present"
            FAILED=1
          fi

          test "$FAILED" -eq 0

      - name: Package unsigned IPA
        shell: bash
        run: |
          set -euo pipefail

          APP_PATH="$GITHUB_WORKSPACE/build/Build/Products/Release-iphoneos/OGGConverter.app"

          test -d "$APP_PATH"

          rm -rf "$GITHUB_WORKSPACE/Payload"
          mkdir "$GITHUB_WORKSPACE/Payload"
          cp -R "$APP_PATH" "$GITHUB_WORKSPACE/Payload/"

          cd "$GITHUB_WORKSPACE"
          rm -f OGGConverter-fixed-unsigned.ipa
          zip -qry OGGConverter-fixed-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OGGConverter-fixed-unsigned-ipa
          path: OGGConverter-fixed-unsigned.ipa
          if-no-files-found: error
          retention-days: 30
